version: '3.8'

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Docker 镜像元数据
        - MAINTAINER=${MAINTAINER:-four-docs}
        - DESCRIPTION=${DESCRIPTION:-four-docs}
    container_name: fourfour-docs
    ports:
      - "${HOST_PORT:-3000}:80"
    restart: unless-stopped
    volumes:
      # 使用 DOCSIFY_BASE_PATH 环境变量动态配置文档路径（支持相对路径和绝对路径）
      - ${DOCSIFY_BASE_PATH:-./docs}:/usr/share/nginx/html/${DOCSIFY_BASE_PATH:-docs}:ro
      - ./static:/usr/share/nginx/html/static:ro
    environment:
      # 自动刷新配置（开发模式）
      - AUTO_RELOAD=${AUTO_RELOAD:-false}
      # Docsify 基础配置
      - DOCSIFY_NAME=${DOCSIFY_NAME:-Four Four Docsify}
      - DOCSIFY_VERSION=${DOCSIFY_VERSION:-2.20.1}
      - DOCSIFY_BASE_PATH=${DOCSIFY_BASE_PATH:-docs}/
      - DOCSIFY_ROUTER_MODE=${DOCSIFY_ROUTER_MODE:-hash}
      - DOCSIFY_SUB_MAX_LEVEL=${DOCSIFY_SUB_MAX_LEVEL:-5}
      - DOCSIFY_SIDEBAR_DISPLAY_LEVEL=${DOCSIFY_SIDEBAR_DISPLAY_LEVEL:-5}
      # 可选：GitHub 仓库地址
      # - DOCSIFY_REPO=https://github.com/your-repo/docs
      # 百度统计 ID
      - BAIDU_TJ_ID=
      # Valine 评论系统配置
      - VALINE_APP_ID=
      - VALINE_APP_KEY=
      # 认证配置
      - AUTH_ENABLE=true
      - AUTH_PASSWORD=
      # 如果需要使用代理，取消下面的注释并修改代理地址
#      - HTTP_PROXY=http://host.docker.internal:7890
#      - HTTPS_PROXY=http://host.docker.internal:7890
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - docs-network

networks:
  docs-network:
    driver: bridge
