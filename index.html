    // 自动刷新功能（开发模式）
    (function() {
      // 只在 localhost 或明确启用时生效
      var autoReloadEnabled = false;
      
      // 检查是否启用了自动刷新
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        autoReloadEnabled = true;
      }
      
      if (!autoReloadEnabled) return;
      
      console.log('Auto-reload enabled for development');
      
      // 记录初始加载时间
      var pageLoadTime = Date.now();
      var checkInterval = 1000; // 每1秒检查一次
      var lastModifiedTime = null;
      
      // 首次加载时获取当前的 Last-Modified
      fetch('/index.html?t=' + Date.now(), { 
        method: 'HEAD',
        cache: 'no-cache'
      })
      .then(function(response) {
        lastModifiedTime = response.headers.get('Last-Modified');
        console.log('Initial Last-Modified:', lastModifiedTime);
      });
      
      setInterval(function() {
        // 通过检查 index.html 的变化来判断是否需要刷新
        fetch('/index.html?t=' + Date.now(), { 
          method: 'HEAD',
          cache: 'no-cache'
        })
        .then(function(response) {
          var currentModified = response.headers.get('Last-Modified');
          if (currentModified && lastModifiedTime && currentModified !== lastModifiedTime) {
            console.log('Page updated, reloading...');
            console.log('Old:', lastModifiedTime, 'New:', currentModified);
            location.reload(true); // true 表示强制从服务器重新加载
          }
          lastModifiedTime = currentModified;
        })
        .catch(function(err) {
          console.error('Auto-reload check failed:', err);
        });
      }, checkInterval);
      
      // 监听 visibilitychange 事件，当用户返回页面时也检查更新
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          pageLoadTime = Date.now(); // 重置加载时间
        }
      });
    })();

            if (lang === 'drawio') {

                return window.drawioConverter(code)
              } else {
                return `<div class='drawio-code'>${code}</div>`
              }
            } else if(lang === 'pdf'){
              var pdf_renderer = function(code, lang, verify) {
                  function unique_id_generator(){
                      function rand_gen(){
                          return Math.floor((Math.random()+1) * 65536).toString(16).substring(1);
                      }
                      return rand_gen() + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + rand_gen() + rand_gen();
                  }
                  if(lang && !lang.localeCompare('pdf', 'en', {sensitivity: 'base'})){
                      if(verify){
                          return true;
                      }else{
                          var divId = "markdown_code_pdf_container_" + unique_id_generator().toString();
                          var container_list = new Array();
                          if(localStorage.getItem('pdf_container_list')){
                              container_list = JSON.parse(localStorage.getItem('pdf_container_list'));
                          }
                          container_list.push({"pdf_location": code, "div_id": divId});
                          localStorage.setItem('pdf_container_list', JSON.stringify(container_list));
                          return (
                              '<div style="margin-top:'+ PDF_MARGIN_TOP +'; margin-bottom:'+ PDF_MARGIN_BOTTOM +';" id="'+ divId +'">'
                                  + '<a href="'+ code + '"> Link </a> to ' + code +
                              '</div>'
                          );
                      }
                  }
                  return false;
              }
              if(pdf_renderer(code, lang, true)){

              }
            }else {
              return this.origin.code.apply(this, arguments);
            }
          }
        }
